# Recomendado: crear un archivo .env en la raíz con las variables de entorno.
services:
  # Database Service (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: dashboard-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER env var is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Service (Cache)
  redis:
    image: redis:alpine
    container_name: dashboard-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend Service
  backend:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: dashboard-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      # DB1 (mismo postgres local)
      - DB_HOST=postgres
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DATABASE=${POSTGRES_DB:-dashboard_db}
      - DB_PORT=5432
      # DB2 (mismo postgres local — el backend usa DB2_* como conexión principal)
      - DB2_HOST=postgres
      - DB2_USER=${POSTGRES_USER}
      - DB2_PASSWORD=${POSTGRES_PASSWORD}
      - DB2_DATABASE=${POSTGRES_DB:-dashboard_db}
      - DB2_PORT=5432
      # Redis local
      - REDIS_URL=redis://redis:6379
      # JWT
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET env var is required}
      # Servicios externos (se leen del .env raíz)
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - SELLER_EMAIL=${SELLER_EMAIL:-}
      - CLOUD_NAME=${CLOUD_NAME:-}
      - API_KEY=${API_KEY:-}
      - API_SECRET=${API_SECRET:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - ADMIN_NOTIFICATION_EMAIL=${ADMIN_NOTIFICATION_EMAIL:-}
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/api:/app
      - /app/node_modules
    command: nodemon server.js

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001/api
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
      # Exclude backend from frontend container to prevent confusion
      - /app/backend

volumes:
  postgres_data:
  redis_data:
